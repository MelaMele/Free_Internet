name: 30-Minute Market Alert Cron

on:
  schedule:
    # በየ 30 ደቂቃው የክሮን ጥሪ እንዲላክ
    - cron: '*/30 * * * *'
  workflow_dispatch: # በእጅህ በ "Run workflow" ቁልፍ ለመሞከር እንዲያስችል

jobs:
  trigger_alert:
    runs-on: ubuntu-latest
    steps:
      - name: Call Vercel Bot Cron Endpoint
        run: |
          curl -s -X GET "https://free-internet-phi.vercel.app/api/cron"
